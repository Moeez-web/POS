name: Build Windows Installer

# Builds the POS Windows .exe installer (artifact only, no publish) for ad-hoc/PR builds.
# Releases are handled by release.yml (on tag push); this stays manual to avoid
# double-building on a tag.
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install each package directly. We deliberately do NOT run the root
      # `npm install` postinstall (it chains `npm --prefix server/client install`,
      # which is unreliable on Windows: nested npm isn't on PATH and --prefix
      # re-triggers the root postinstall). --ignore-scripts also skips the
      # electron/playwright binary downloads we don't need for packaging.
      - name: Install root dependencies
        run: npm install --ignore-scripts

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Install client dependencies
        working-directory: client
        run: npm install

      # Build each package in its own directory (no nested `npm --prefix`).
      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build client
        working-directory: client
        run: npm run build

      # Packages the Electron app into an NSIS .exe installer.
      # --publish never avoids touching the (placeholder) auto-update feed.
      - name: Package Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: POS-Windows-Installer
          path: release/*.exe
          if-no-files-found: error
